<h1 class="text-3xl">Pokemons List</h1>
<h2 class="text-xl">
  Current Page: {{ currentPage() }}
</h2>

<hr class="my-2">


@if( pokemons() ){
  <pokemons-list [pokemons]="pokemons()" />
} @else {
  <pokemon-list-skeleton/>
}

  <button (click)="loadPokemons(+1)" class="mt-2">
    Next
  </button>
</div>
